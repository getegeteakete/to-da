<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Image Test</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; }
        .test-container { 
            width: 100vw; 
            height: 100vh; 
            background: url("hero-final.png") no-repeat center center;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .test-container::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.3);
        }
        .content {
            position: relative;
            z-index: 1;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <div class="content">
            <h1>山荘 透雫</h1>
            <p>Image Test - Background should be visible</p>
        </div>
    </div>
</body>
</html>
